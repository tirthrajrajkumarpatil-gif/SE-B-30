<!DOCTYPE html>
<html>
<head>
    <title>Smart Expense Manager</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1d2671, #c33764);
            color: white;
            text-align: center;
            padding: 30px;
        }

        .container {
            background: white;
            color: black;
            width: 350px;
            margin: auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 15px black;
        }

        input, select {
            width: 85%;
            padding: 8px;
            margin: 6px;
        }

        button {
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
            margin: 5px;
        }

        .deleteBtn {
            background: red;
            margin-left: 10px;
        }

        li {
            text-align: left;
            margin: 8px;
            background: #f1f1f1;
            padding: 5px;
            border-radius: 5px;
        }

        h3 {
            color: darkblue;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>💰 Smart Expense Manager</h2>

    <input type="text" id="desc" placeholder="Expense name"><br>
    <input type="number" id="amount" placeholder="Amount"><br>

    <select id="category">
        <option>Food</option>
        <option>Travel</option>
        <option>Shopping</option>
        <option>Other</option>
    </select><br>

    <button onclick="addExpense()">Add</button>

    <br><br>

    <select onchange="filterData()" id="filter">
        <option value="All">All</option>
        <option value="Food">Food</option>
        <option value="Travel">Travel</option>
        <option value="Shopping">Shopping</option>
        <option value="Other">Other</option>
    </select>

    <ul id="list"></ul>

    <h3 id="total">Total: ₹0</h3>
</div>

<script>

let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

function saveData() {
    localStorage.setItem("expenses", JSON.stringify(expenses));
}

function addExpense() {
    let desc = document.getElementById("desc").value;
    let amount = Number(document.getElementById("amount").value);
    let category = document.getElementById("category").value;

    if(desc === "" || amount <= 0) return;

    let expense = {
        id: Date.now(),
        desc: desc,
        amount: amount,
        category: category
    };

    expenses.push(expense);
    saveData();
    display(expenses);

    document.getElementById("desc").value = "";
    document.getElementById("amount").value = "";
}

function deleteExpense(id) {
    expenses = expenses.filter(e => e.id !== id);
    saveData();
    display(expenses);
}

function display(data) {
    let list = document.getElementById("list");
    list.innerHTML = "";

    let total = 0;

    data.forEach(e => {
        let li = document.createElement("li");

        li.innerHTML = `
            ${e.desc} - ₹${e.amount} (${e.category})
            <button class="deleteBtn" onclick="deleteExpense(${e.id})">X</button>
        `;

        list.appendChild(li);
        total += e.amount;
    });

    document.getElementById("total").innerText = "Total: ₹" + total;
}

function filterData() {
    let value = document.getElementById("filter").value;

    if(value === "All") {
        display(expenses);
    } else {
        let filtered = expenses.filter(e => e.category === value);
        display(filtered);
    }
}

display(expenses);

</script>

</body>
</html>
